<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music — Agentic RAG Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; }

    /* Sidebar */
    .music-sidebar { width: 56px; min-width: 56px; }
    .sidebar-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 10px 4px; border-radius: 8px; cursor: pointer;
      transition: all 0.15s; width: 100%; color: #64748b; border: none; background: none;
    }
    .sidebar-item:hover { background: rgba(99,102,241,0.08); color: #334155; }
    .sidebar-item.active { background: rgba(99,102,241,0.08); color: #6366f1; }
    .sidebar-item i { font-size: 15px; line-height: 1; }
    .sidebar-item span { font-size: 8px; font-weight: 500; letter-spacing: 0.02em; line-height: 1.2; text-align: center; }

    /* Bottom input container */
    .input-container {
      position: relative; border: 1.5px solid #e5e7eb; border-radius: 16px;
      background: #fff; max-width: 660px; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-container:focus-within {
      border-color: #c7d2fe; box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }
    .input-container textarea {
      width: 100%; border: none; outline: none; resize: none;
      padding: 14px 18px 6px; font-size: 15px; color: #1f2937;
      background: transparent; min-height: 42px; max-height: 120px;
    }
    .input-container textarea::placeholder { color: #9ca3af; }
    .input-bottom-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 14px 10px;
    }
    .input-icon-btn {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: none; background: transparent; color: #9ca3af;
      cursor: pointer; transition: all 0.15s; font-size: 14px;
    }
    .input-icon-btn:hover { background: #f3f4f6; color: #4b5563; }

    /* Ultra badge */
    .ultra-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px; background: #f9fafb;
      color: #374151; font-size: 12px; font-weight: 500;
    }
    .ultra-badge i { font-size: 11px; color: #6b7280; }

    /* Toolbar pills (above input) */
    .toolbar-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px; border: 1px solid #e5e7eb;
      background: #fff; color: #374151; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .toolbar-pill:hover { border-color: #c7d2fe; background: #fafafa; }
    .toolbar-pill .pill-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #10b981; flex-shrink: 0;
    }

    /* Model selector dropdown */
    .model-dropdown {
      position: absolute; bottom: calc(100% + 8px); left: 0;
      width: 420px; max-height: 480px; overflow-y: auto;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 50;
    }
    .model-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; cursor: pointer; transition: background 0.1s;
      border-bottom: 1px solid #f3f4f6;
    }
    .model-item:last-child { border-bottom: none; }
    .model-item:hover { background: #f9fafb; }
    .model-item.selected { background: #f0f9ff; }
    .model-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .model-info { flex: 1; min-width: 0; }
    .model-info .model-name { font-size: 14px; font-weight: 600; color: #111827; margin-bottom: 2px; }
    .model-info .model-desc { font-size: 12px; color: #9ca3af; line-height: 1.4; }
    .model-radio {
      width: 18px; height: 18px; border-radius: 50%; border: 2px solid #d1d5db;
      flex-shrink: 0; margin-top: 4px; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .model-radio.checked {
      border-color: #3b82f6; background: #3b82f6;
    }
    .model-radio.checked::after {
      content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%;
    }

    /* Genre selector dropdown */
    .genre-dropdown {
      position: absolute; bottom: calc(100% + 8px); left: 140px;
      width: 280px; max-height: 360px; overflow-y: auto;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 50;
    }
    .genre-item {
      padding: 10px 16px; cursor: pointer; font-size: 13px; color: #374151;
      transition: background 0.1s; display: flex; align-items: center; justify-content: space-between;
    }
    .genre-item:hover { background: #f9fafb; }
    .genre-item.selected { background: #eef2ff; color: #4338ca; font-weight: 600; }

    /* Responsive */
    @media (max-width: 768px) {
      .music-sidebar { width: 44px; min-width: 44px; }
      .sidebar-item span { display: none; }
      .model-dropdown { width: 320px; }
    }
    @media (max-width: 480px) {
      .model-dropdown { width: 280px; }
    }
  </style>
</head>
<body class="bg-white text-gray-800 h-screen flex overflow-hidden">

  <!-- ============================================================ -->
  <!-- LEFT SIDEBAR -->
  <!-- ============================================================ -->
  <nav class="music-sidebar bg-gray-50 border-r border-gray-200 flex flex-col items-center py-3 shrink-0">
    <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center mb-4 cursor-pointer"
         title="Home" onclick="navigateHome()">
      <i class="fas fa-brain text-white text-sm"></i>
    </div>

    <div class="flex-1 w-full px-1 space-y-1 overflow-y-auto">
      <button class="sidebar-item" onclick="navigateHome()" title="New">
        <i class="fas fa-plus"></i><span>New</span>
      </button>
      <button class="sidebar-item active" title="AI Music">
        <i class="fas fa-music"></i><span>AI Music</span>
      </button>
      <button class="sidebar-item" onclick="navigateHome()" title="Home">
        <i class="fas fa-home"></i><span>Home</span>
      </button>
      <button class="sidebar-item" title="Photo">
        <i class="fas fa-camera"></i><span>Photo</span>
      </button>
      <button class="sidebar-item" title="Workflows">
        <i class="fas fa-project-diagram"></i><span>Workflows</span>
      </button>
      <button class="sidebar-item" title="MeM">
        <i class="fas fa-puzzle-piece"></i><span>MeM</span>
      </button>
      <button class="sidebar-item" title="Hub">
        <i class="fas fa-th-large"></i><span>Hub</span>
      </button>
      <button class="sidebar-item" title="AI Chat">
        <i class="fas fa-comment-dots"></i><span>AI Chat</span>
      </button>
    </div>

    <div class="w-full px-1 space-y-1 border-t border-gray-200 pt-2 mt-2">
      <button class="sidebar-item" title="Settings">
        <i class="fas fa-cog"></i><span>Settings</span>
      </button>
      <div class="flex items-center justify-center pt-1">
        <div class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center text-xs text-indigo-600 font-bold cursor-pointer" title="User">U</div>
      </div>
    </div>
  </nav>

  <!-- ============================================================ -->
  <!-- MAIN CONTENT -->
  <!-- ============================================================ -->
  <main class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Top bar -->
    <header class="flex items-center justify-between px-4 py-2 border-b border-gray-100 shrink-0 bg-white">
      <div class="flex items-center gap-3">
        <button onclick="navigateHome()" class="text-gray-500 hover:text-gray-800 transition p-1" title="Back">
          <i class="fas fa-chevron-left text-sm"></i>
        </button>
        <button class="text-gray-500 hover:text-gray-800 transition p-1 text-lg leading-none" title="Menu">≡</button>
      </div>
      <div class="absolute left-1/2 transform -translate-x-1/2">
        <span class="text-base font-semibold text-gray-900">AI Music</span>
      </div>
      <div class="flex items-center gap-2">
        <button class="text-gray-400 hover:text-gray-600 transition p-1.5 rounded-lg hover:bg-gray-50" title="Edit">
          <i class="fas fa-pen-to-square text-sm"></i>
        </button>
      </div>
    </header>

    <!-- Main area: centered title + bottom-pinned input -->
    <div class="flex-1 flex flex-col relative overflow-hidden">

      <!-- Center content -->
      <div class="flex-1 flex items-center justify-center px-6">
        <h1 class="text-3xl font-bold text-gray-900 text-center leading-snug max-w-xl" id="heroTitle">
          Create original music, songs, and instrumental tracks with AI
        </h1>
      </div>

      <!-- Bottom input area (pinned to bottom) -->
      <div class="px-6 pb-6 pt-2">
        <div class="max-w-[660px] mx-auto">

          <!-- Toolbar pills row -->
          <div class="flex items-center gap-2 mb-3 relative" id="toolbarRow">
            <button class="toolbar-pill" id="modelPill" onclick="toggleModelDropdown()">
              <span class="pill-dot"></span> Auto-select Models
            </button>
            <button class="toolbar-pill" id="genrePill" onclick="toggleGenreDropdown()">
              <i class="fas fa-music text-xs text-gray-400"></i> Auto Genre
            </button>
            <button class="toolbar-pill" onclick="openAssets()">
              <i class="fas fa-pencil text-xs text-gray-400"></i> Assets
              <i class="fas fa-chevron-right text-[10px] text-gray-400"></i>
            </button>

            <!-- Model selector dropdown -->
            <div id="modelDropdown" class="model-dropdown" style="display:none;"></div>

            <!-- Genre selector dropdown -->
            <div id="genreDropdown" class="genre-dropdown" style="display:none;"></div>
          </div>

          <!-- Input box -->
          <div class="input-container" id="inputContainer">
            <textarea id="musicInput"
              placeholder="Describe the music or sound effect you want to create"
              rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generateMusic()}"
              oninput="autoResize(this)"
            ></textarea>
            <div class="input-bottom-row">
              <div class="flex items-center gap-2">
                <button class="input-icon-btn" title="Options" onclick="toggleOptions()">
                  <i class="fas fa-minus text-xs"></i>
                </button>
                <div class="ultra-badge">
                  <i class="fas fa-hexagon-nodes"></i> Ultra
                </div>
              </div>
              <div class="flex items-center gap-1">
                <button class="input-icon-btn" title="Voice input">
                  <i class="fas fa-microphone"></i>
                </button>
                <button class="input-icon-btn" title="Generate" onclick="generateMusic()">
                  <i class="fas fa-arrow-turn-down" style="transform: rotate(90deg);"></i>
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- ============================================================ -->
  <!-- GENERATING MODAL -->
  <!-- ============================================================ -->
  <div id="generatingModal" style="display:none;" class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center" onclick="if(event.target===this)cancelGeneration()">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 text-center shadow-2xl">
      <div class="relative w-16 h-16 mx-auto mb-4">
        <div class="absolute inset-0 rounded-full border-4 border-gray-200"></div>
        <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
        <i class="fas fa-music text-indigo-500 text-xl absolute inset-0 flex items-center justify-center"></i>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-2">Generating Your Music</h3>
      <p id="generatingStatus" class="text-sm text-gray-500">Analyzing your description...</p>
      <div class="mt-4 w-full bg-gray-200 rounded-full h-1.5">
        <div id="generatingProgress" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-1000" style="width:10%"></div>
      </div>
      <button onclick="cancelGeneration()" class="mt-4 text-xs text-gray-400 hover:text-gray-600 transition">Cancel</button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- ASSETS PANEL -->
  <!-- ============================================================ -->
  <div id="assetsPanel" style="display:none;" class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center" onclick="if(event.target===this)closeAssets()">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-gray-900">Assets</h3>
        <button onclick="closeAssets()" class="text-gray-400 hover:text-gray-600 transition"><i class="fas fa-times"></i></button>
      </div>
      <p class="text-sm text-gray-500 mb-5">Upload reference audio, lyrics, or melody files to guide the AI generation.</p>

      <!-- Upload area -->
      <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 mb-4 cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30 transition text-center" onclick="uploadAsset()">
        <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-3"></i>
        <p class="text-sm text-gray-500 font-medium">Drop files here or click to upload</p>
        <p class="text-xs text-gray-400 mt-1">MP3, WAV, MIDI, TXT (lyrics) up to 15MB</p>
      </div>

      <!-- Asset types -->
      <div class="grid grid-cols-3 gap-2 mb-4">
        <button class="px-3 py-2 border border-gray-200 rounded-lg text-xs font-medium text-gray-600 hover:border-indigo-400 hover:bg-indigo-50 transition text-center">
          <i class="fas fa-file-audio block text-lg text-gray-400 mb-1"></i>
          Reference Audio
        </button>
        <button class="px-3 py-2 border border-gray-200 rounded-lg text-xs font-medium text-gray-600 hover:border-indigo-400 hover:bg-indigo-50 transition text-center">
          <i class="fas fa-file-lines block text-lg text-gray-400 mb-1"></i>
          Lyrics
        </button>
        <button class="px-3 py-2 border border-gray-200 rounded-lg text-xs font-medium text-gray-600 hover:border-indigo-400 hover:bg-indigo-50 transition text-center">
          <i class="fas fa-guitar block text-lg text-gray-400 mb-1"></i>
          Melody
        </button>
      </div>

      <button onclick="closeAssets()" class="w-full py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl text-sm font-medium transition">Close</button>
    </div>
  </div>

  <script>
    // ============================================================
    // AI MUSIC — Frontend Logic
    // ============================================================

    let selectedModel = 'auto-select';
    let selectedGenre = 'auto';
    let isGenerating = false;

    // ---- Model data ----
    const models = [
      {
        id: 'auto-select',
        name: 'Auto-select Models',
        desc: 'Automatically select the best model for your query.',
        icon: '<i class="fas fa-robot text-white"></i>',
        iconBg: '#64748b'
      },
      {
        id: 'elevenlabs-music',
        name: 'ElevenLabs Music',
        desc: 'Instrumental music up to 1 hour. Various genres, no custom lyrics support.',
        icon: '<span class="text-white font-bold text-xs">II</span>',
        iconBg: '#111827'
      },
      {
        id: 'minimax-music-2.5',
        name: 'MiniMax Music 2.5',
        desc: 'High-fidelity songs with humanized vocals. Supports [Intro], [Chorus], [Bridge], [Instrumental Intro] markers.',
        icon: '<span class="text-white font-bold text-sm">M</span>',
        iconBg: 'linear-gradient(135deg, #ef4444, #f97316)'
      },
      {
        id: 'mureka-song',
        name: 'Mureka Song',
        desc: 'Full songs with vocals up to 3 min. Lyrics generation, stem separation.',
        icon: '<i class="fas fa-music text-white text-xs"></i>',
        iconBg: '#1e293b'
      },
      {
        id: 'lyria2',
        name: 'Lyria2 Music Generator',
        desc: "Google's Lyria 2 for instrumental music and sound effects. No lyrics support.",
        icon: '<span class="font-bold text-sm" style="background:linear-gradient(135deg,#4285f4,#ea4335,#fbbc04,#34a853);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">G</span>',
        iconBg: '#f3f4f6'
      },
      {
        id: 'elevenlabs-sfx',
        name: 'ElevenLabs Sound Effects',
        desc: 'Professional sound effects and environmental audio textures.',
        icon: '<span class="text-white font-bold text-xs">II</span>',
        iconBg: '#111827'
      },
      {
        id: 'cassetteai',
        name: 'CassetteAI',
        desc: 'Background music with extended duration. Various styles.',
        icon: '<i class="fas fa-compact-disc text-white text-xs"></i>',
        iconBg: '#10b981'
      },
      {
        id: 'mureka-instrumental',
        name: 'Mureka Instrumental',
        desc: 'Instrumental tracks up to 3 min. Style prompts, reference-based, no vocals.',
        icon: '<i class="fas fa-guitar text-white text-xs"></i>',
        iconBg: '#6366f1'
      }
    ];

    // ---- Genre data ----
    const genres = [
      'Auto', 'Pop', 'Rock', 'Hip Hop', 'R&B', 'Jazz', 'Classical',
      'Electronic', 'EDM', 'Lo-Fi', 'Ambient', 'Country', 'Folk',
      'Latin', 'Reggae', 'Blues', 'Metal', 'Punk', 'Soul', 'Funk',
      'Indie', 'K-Pop', 'Cinematic', 'Sound Effects'
    ];

    // ---- Navigation ----
    function navigateHome() {
      window.location.href = '/';
    }

    // ---- Model dropdown ----
    function renderModelDropdown() {
      const dropdown = document.getElementById('modelDropdown');
      dropdown.innerHTML = models.map(m => {
        const isSelected = m.id === selectedModel;
        const bgStyle = m.iconBg.includes('gradient') ? `background:${m.iconBg}` : `background:${m.iconBg}`;
        return `
          <div class="model-item ${isSelected ? 'selected' : ''}" onclick="selectModel('${m.id}')">
            <div class="model-icon" style="${bgStyle}">${m.icon}</div>
            <div class="model-info">
              <div class="model-name">${m.name}</div>
              <div class="model-desc">${m.desc}</div>
            </div>
            <div class="model-radio ${isSelected ? 'checked' : ''}"></div>
          </div>
        `;
      }).join('');
    }

    function toggleModelDropdown() {
      const dropdown = document.getElementById('modelDropdown');
      const genreDropdown = document.getElementById('genreDropdown');
      genreDropdown.style.display = 'none';

      if (dropdown.style.display === 'none') {
        renderModelDropdown();
        dropdown.style.display = '';
      } else {
        dropdown.style.display = 'none';
      }
    }

    function selectModel(id) {
      selectedModel = id;
      const model = models.find(m => m.id === id);
      const pill = document.getElementById('modelPill');

      if (id === 'auto-select') {
        pill.innerHTML = '<span class="pill-dot"></span> Auto-select Models';
      } else {
        pill.innerHTML = `<span class="pill-dot" style="background:#3b82f6;"></span> ${model.name}`;
      }

      renderModelDropdown();
      setTimeout(() => {
        document.getElementById('modelDropdown').style.display = 'none';
      }, 150);
    }

    // ---- Genre dropdown ----
    function toggleGenreDropdown() {
      const dropdown = document.getElementById('genreDropdown');
      const modelDropdown = document.getElementById('modelDropdown');
      modelDropdown.style.display = 'none';

      if (dropdown.style.display === 'none') {
        renderGenreDropdown();
        dropdown.style.display = '';
      } else {
        dropdown.style.display = 'none';
      }
    }

    function renderGenreDropdown() {
      const dropdown = document.getElementById('genreDropdown');
      dropdown.innerHTML = genres.map(g => {
        const isSelected = g.toLowerCase() === selectedGenre.toLowerCase();
        return `
          <div class="genre-item ${isSelected ? 'selected' : ''}" onclick="selectGenre('${g}')">
            <span>${g}</span>
            ${isSelected ? '<i class="fas fa-check text-xs text-indigo-500"></i>' : ''}
          </div>
        `;
      }).join('');
    }

    function selectGenre(genre) {
      selectedGenre = genre;
      const pill = document.getElementById('genrePill');
      if (genre.toLowerCase() === 'auto') {
        pill.innerHTML = '<i class="fas fa-music text-xs text-gray-400"></i> Auto Genre';
      } else {
        pill.innerHTML = `<i class="fas fa-music text-xs text-indigo-500"></i> ${genre}`;
      }
      document.getElementById('genreDropdown').style.display = 'none';
    }

    // ---- Assets ----
    function openAssets() {
      document.getElementById('assetsPanel').style.display = '';
    }
    function closeAssets() {
      document.getElementById('assetsPanel').style.display = 'none';
    }
    function uploadAsset() {
      showToast('Asset upload — drag & drop or click to browse');
    }

    // ---- Options toggle ----
    function toggleOptions() {
      showToast('Additional options panel coming soon');
    }

    // ---- Textarea auto-resize ----
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ---- Generate music ----
    function generateMusic() {
      const input = document.getElementById('musicInput');
      const prompt = input.value.trim();
      if (!prompt) {
        input.focus();
        input.placeholder = 'Please describe the music you want to create...';
        setTimeout(() => { input.placeholder = 'Describe the music or sound effect you want to create'; }, 2000);
        return;
      }

      // Hide hero title
      document.getElementById('heroTitle').style.opacity = '0.3';

      isGenerating = true;
      const modal = document.getElementById('generatingModal');
      const progress = document.getElementById('generatingProgress');
      const status = document.getElementById('generatingStatus');
      modal.style.display = '';

      const stages = [
        { pct: 10, text: 'Analyzing your description...' },
        { pct: 25, text: `Selecting ${selectedModel === 'auto-select' ? 'best model' : models.find(m => m.id === selectedModel)?.name}...` },
        { pct: 40, text: selectedGenre === 'auto' ? 'Detecting genre from prompt...' : `Applying ${selectedGenre} genre...` },
        { pct: 60, text: 'Composing melody and structure...' },
        { pct: 75, text: 'Generating audio waveform...' },
        { pct: 90, text: 'Mastering and finalizing...' },
        { pct: 100, text: 'Music ready!' }
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (!isGenerating) { clearInterval(interval); return; }
        if (i < stages.length) {
          progress.style.width = stages[i].pct + '%';
          status.textContent = stages[i].text;
          i++;
        }
        if (i >= stages.length) {
          clearInterval(interval);
          setTimeout(() => {
            if (isGenerating) {
              modal.style.display = 'none';
              isGenerating = false;
              document.getElementById('heroTitle').style.opacity = '1';
              showToast('Music generated successfully! Opening player...');
            }
          }, 1200);
        }
      }, 1400);

      // Send to API
      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `Create music: ${prompt}`,
          model: selectedModel,
          agentType: 'music',
          settings: { genre: selectedGenre }
        })
      }).catch(() => {});
    }

    function cancelGeneration() {
      isGenerating = false;
      document.getElementById('generatingModal').style.display = 'none';
      document.getElementById('heroTitle').style.opacity = '1';
    }

    // ---- Close dropdowns on outside click ----
    document.addEventListener('click', (e) => {
      const modelDropdown = document.getElementById('modelDropdown');
      const genreDropdown = document.getElementById('genreDropdown');
      const modelPill = document.getElementById('modelPill');
      const genrePill = document.getElementById('genrePill');

      if (!modelDropdown.contains(e.target) && e.target !== modelPill && !modelPill.contains(e.target)) {
        modelDropdown.style.display = 'none';
      }
      if (!genreDropdown.contains(e.target) && e.target !== genrePill && !genrePill.contains(e.target)) {
        genreDropdown.style.display = 'none';
      }
    });

    // ---- Keyboard shortcut ----
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('modelDropdown').style.display = 'none';
        document.getElementById('genreDropdown').style.display = 'none';
        closeAssets();
        if (isGenerating) cancelGeneration();
      }
    });

    // ---- Toast ----
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-xl text-sm font-medium shadow-lg z-[100] transition-all duration-300';
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(10px)';
      toast.textContent = message;
      document.body.appendChild(toast);
      requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
      });
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(10px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
</body>
</html>
