<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }

    /* Sidebar */
    .nav-sidebar { width: 48px; min-width: 48px; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      padding: 8px 2px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; width: 100%; color: #64748b; border: none; background: none;
    }
    .nav-item:hover { background: rgba(168,85,247,0.08); color: #334155; }
    .nav-item.active { background: rgba(168,85,247,0.1); color: #9333ea; }
    .nav-item i { font-size: 14px; line-height: 1; }
    .nav-item span { font-size: 7px; font-weight: 500; line-height: 1.1; text-align: center; margin-top: 1px; }

    /* Input bar */
    .designer-input {
      border: 1.5px solid #e5e7eb; border-radius: 14px; background: #fff;
      overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
      max-width: 560px; width: 100%;
    }
    .designer-input:focus-within { border-color: #d8b4fe; box-shadow: 0 0 0 3px rgba(168,85,247,0.08); }
    .designer-input textarea {
      width: 100%; border: none; outline: none; resize: none;
      padding: 14px 18px 4px; font-size: 14px; color: #1f2937;
      background: transparent; min-height: 36px; max-height: 80px;
    }
    .designer-input textarea::placeholder { color: #9ca3af; }
    .designer-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px 8px;
    }
    .designer-toolbar .left { display: flex; align-items: center; gap: 3px; }
    .designer-toolbar .right { display: flex; align-items: center; gap: 5px; }
    .tool-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; border: none; background: transparent; color: #9ca3af;
      cursor: pointer; transition: all 0.15s; font-size: 13px;
    }
    .tool-btn:hover { background: #f3f4f6; color: #4b5563; }
    .send-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: none; background: #111827; color: #fff;
      cursor: pointer; transition: all 0.15s; font-size: 11px;
    }
    .send-btn:hover { background: #374151; }

    /* Category icons */
    .cat-icon {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: transform 0.15s; min-width: 68px;
    }
    .cat-icon:hover { transform: translateY(-3px); }
    .cat-icon-circle {
      width: 56px; height: 56px; border-radius: 16px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #f3f4f6; background: #fafafa; transition: all 0.2s;
    }
    .cat-icon:hover .cat-icon-circle { border-color: #d8b4fe; box-shadow: 0 2px 8px rgba(168,85,247,0.12); }
    .cat-icon-circle i { font-size: 22px; }
    .cat-icon-label { font-size: 10px; color: #6b7280; font-weight: 500; text-align: center; line-height: 1.2; }
    .cat-icon.active .cat-icon-circle { border-color: #a855f7; background: #faf5ff; }
    .cat-icon.active .cat-icon-label { color: #7c3aed; font-weight: 600; }

    /* Gallery grid */
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .gallery-card {
      border-radius: 10px; overflow: hidden; cursor: pointer;
      transition: all 0.2s; background: #fff; position: relative;
      aspect-ratio: 3/4;
    }
    .gallery-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
    .gallery-card .card-bg {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      padding: 16px; text-align: center; position: relative;
    }
    .gallery-card .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.65));
      color: #fff;
    }
    .gallery-card .card-title { font-size: 11px; font-weight: 600; line-height: 1.3; }
    .gallery-card .card-sub { font-size: 9px; opacity: 0.8; margin-top: 2px; }
    .gallery-card .card-actions {
      position: absolute; top: 8px; right: 8px; display: flex; gap: 4px;
      opacity: 0; transition: opacity 0.2s;
    }
    .gallery-card:hover .card-actions { opacity: 1; }
    .card-action-btn {
      width: 26px; height: 26px; border-radius: 6px; border: none;
      background: rgba(255,255,255,0.9); color: #374151; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 11px;
      backdrop-filter: blur(4px); transition: all 0.12s;
    }
    .card-action-btn:hover { background: #fff; color: #7c3aed; }

    /* Section header */
    .section-header {
      font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    @media (max-width: 768px) {
      .nav-sidebar { width: 40px; min-width: 40px; }
      .nav-item span { display: none; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .cat-icons-wrap { gap: 10px !important; }
      .cat-icon-circle { width: 46px; height: 46px; border-radius: 12px; }
      .cat-icon-circle i { font-size: 18px; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }
  </style>
</head>

  document.addEventListener('DOMContentLoaded', () => {
    renderGallery();
  });

  // ============================================================
  // CATEGORY SELECTION
  // ============================================================
  function selectCategory(cat, el) {
    currentCat = cat;
    document.querySelectorAll('.cat-icon').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
    renderGallery();
    // Scroll to gallery
    document.getElementById('galleryContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ============================================================
  // GALLERY RENDERING
  // ============================================================
  function renderGallery() {
    const container = document.getElementById('galleryContainer');
    let html = '';

    // Render current category
    const catName = {
      poster:'Poster', flyer:'Flyer', product:'Product', menu:'Menu', coupon:'Coupon',
      social:'Social Media', wallpaper:'Wallpaper', card:'Card & Invite', stylized:'Stylized Name',
      comic:'Comic', meme:'Meme', character:'Character', logo:'Logo', sticker:'Sticker',
      home:'Home Design', tshirt:'T-shirt'
    };

    const items = GALLERY[currentCat] || [];
    html += `<div class="section-header">${catName[currentCat] || currentCat}</div>`;
    html += `<div class="gallery-grid mb-10">`;
    items.forEach((item, idx) => {
      html += renderCard(item, idx);
    });
    html += `</div>`;

    // Also show a "More Designs" section with a different category
    const otherCats = Object.keys(GALLERY).filter(c => c !== currentCat);
    const nextCat = otherCats[Math.floor(Math.random() * otherCats.length)];
    const nextItems = GALLERY[nextCat] || [];
    if (nextItems.length > 0) {
      html += `<div class="section-header">${catName[nextCat] || nextCat} <span class="text-xs text-gray-400 font-normal ml-2">More designs</span></div>`;
      html += `<div class="gallery-grid mb-10">`;
      nextItems.slice(0, 6).forEach((item, idx) => {
        html += renderCard(item, idx + 100);
      });
      html += `</div>`;
    }

    container.innerHTML = html;
  }

  function renderCard(item, idx) {
    return `
      <div class="gallery-card" onclick="openDesign('${item.title}')">
        <div class="card-bg bg-gradient-to-br ${item.gradient}">
          <div class="flex flex-col items-center justify-center gap-2">
            <i class="fas ${item.icon} text-3xl" style="color:${item.accent}; opacity:0.9;"></i>
            <div class="text-center">
              <div class="font-bold text-sm" style="color:${item.accent};">${item.title}</div>
              <div class="text-[10px] mt-0.5" style="color:${item.accent}; opacity:0.7;">${item.sub}</div>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <button class="card-action-btn" onclick="event.stopPropagation(); likeDesign('${item.title}')" title="Like"><i class="fas fa-heart"></i></button>
          <button class="card-action-btn" onclick="event.stopPropagation(); downloadDesign('${item.title}')" title="Download"><i class="fas fa-download"></i></button>
        </div>
        <div class="card-overlay">
          <div class="card-title">${item.title}</div>
          <div class="card-sub">${item.sub}</div>
        </div>
      </div>`;
  }

  // ============================================================
  // DESIGN ACTIONS
  // ============================================================
  function generateDesign() {
    const input = document.getElementById('designInput');
    const prompt = input.value.trim();
    if (!prompt) { input.focus(); input.placeholder = 'Describe your design first...'; setTimeout(() => { input.placeholder = 'Design a stroke'; }, 2000); return; }

    generating = true;
    document.getElementById('genOverlay').style.display = '';
    const stages = ['Analyzing your prompt...', 'Generating design concepts...', 'Rendering visuals...', 'Applying styles...', 'Design ready!'];
    let i = 0;
    const iv = setInterval(() => {
      if (!generating) { clearInterval(iv); return; }
      if (i < stages.length) { document.getElementById('genStatus').textContent = stages[i]; i++; }
      if (i >= stages.length) {
        clearInterval(iv);
        setTimeout(() => { generating = false; document.getElementById('genOverlay').style.display = 'none'; showToast('Design generated! Check the gallery below.'); }, 800);
      }
    }, 1200);

    fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Design: ${prompt}`, model: 'gpt-4o', agentType: 'designer' })
    }).catch(() => {});
  }

  function cancelGen() { generating = false; document.getElementById('genOverlay').style.display = 'none'; }

  function openDesign(title) {
    const cat = currentCat;
    const catLabel = { poster:'Poster', flyer:'Flyer', product:'Product', menu:'Menu', coupon:'Coupon', social:'Social Media', wallpaper:'Wallpaper', card:'Card & Invite', stylized:'Stylized Name', comic:'Comic', meme:'Meme', character:'Character', logo:'Logo', sticker:'Sticker', home:'Home Design', tshirt:'T-shirt' };
    document.getElementById('designInput').value = `Create a ${catLabel[cat] || cat} design: ${title}`;
    document.getElementById('designInput').focus();
    autoResize(document.getElementById('designInput'));
    document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
  }

  function likeDesign(title) { showToast('Liked: ' + title); }
  function downloadDesign(title) { showToast('Download: ' + title + ' (AI generation will produce a downloadable image)'); }

  // ============================================================
  // UTILS
  // ============================================================
  function navigateHome() { window.location.href = '/'; }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-medium shadow-lg z-50';
    t.style.opacity = '0'; t.style.transition = 'opacity 0.2s';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => { t.style.opacity = '1'; });
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2500);
  }
  </script>
