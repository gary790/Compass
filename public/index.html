<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic RAG Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .thinking-dot { animation: pulse-dot 1.5s infinite; }
    @keyframes slide-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .message-enter { animation: slide-in 0.3s ease-out; }
    pre code { font-size: 13px !important; line-height: 1.5 !important; }

    /* Sidebar icon buttons */
    .sidebar-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 10px 4px; border-radius: 8px; transition: all 0.15s;
      cursor: pointer; width: 100%; color: #64748b; border: none; background: none;
      text-decoration: none;
    }
    .sidebar-btn:hover { background: rgba(99,102,241,0.08); color: #334155; }
    .sidebar-btn.active { background: rgba(99,102,241,0.12); color: #6366f1; }
    .sidebar-btn i { font-size: 16px; line-height: 1; }
    .sidebar-btn span { font-size: 9px; font-weight: 500; letter-spacing: 0.02em; line-height: 1.2; }

    /* ===== HOME PAGE — Genspark-style centered layout ===== */
    .home-input-box {
      border: 1px solid #e5e7eb; border-radius: 16px; background: #fff;
      padding: 0; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .home-input-box:focus-within { border-color: #c7d2fe; box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
    .home-input-box textarea {
      width: 100%; border: none; outline: none; resize: none;
      padding: 16px 18px 8px; font-size: 15px; color: #1f2937;
      background: transparent; min-height: 44px; max-height: 120px;
    }
    .home-input-box textarea::placeholder { color: #9ca3af; }
    .home-input-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px 10px; gap: 6px;
    }
    .home-input-toolbar .toolbar-left { display: flex; align-items: center; gap: 4px; }
    .home-input-toolbar .toolbar-right { display: flex; align-items: center; gap: 6px; }
    .toolbar-icon-btn {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: none; background: transparent; color: #9ca3af;
      cursor: pointer; transition: all 0.15s; font-size: 14px;
    }
    .toolbar-icon-btn:hover { background: #f3f4f6; color: #4b5563; }
    .toolbar-model-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 8px; border: none;
      background: transparent; color: #9ca3af; font-size: 12px;
      cursor: pointer; transition: all 0.15s; font-weight: 500;
    }
    .toolbar-model-pill:hover { background: #f3f4f6; color: #4b5563; }
    .send-btn-dark {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-radius: 20px; border: none;
      background: #111827; color: #fff; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .send-btn-dark:hover { background: #1f2937; }
    .send-btn-dark:disabled { opacity: 0.5; cursor: not-allowed; }

    .suggestion-pill {
      display: inline-flex; align-items: center;
      padding: 7px 14px; border-radius: 20px;
      background: #f9fafb; border: 1px solid #f3f4f6;
      font-size: 12px; color: #6b7280; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .suggestion-pill:hover { background: #f3f4f6; border-color: #e5e7eb; color: #374151; }

    .service-icon-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: transform 0.15s; min-width: 64px;
    }
    .service-icon-item:hover { transform: translateY(-2px); }
    .service-icon-circle {
      width: 44px; height: 44px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .service-icon-label { font-size: 10px; color: #6b7280; font-weight: 500; text-align: center; line-height: 1.2; }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar-btn span { display: none; }
      .sidebar-btn { padding: 8px 4px; }
      nav.w-14 { width: 44px; min-width: 44px; }
    }
    @media (max-width: 480px) {
      nav.w-14 { width: 40px; min-width: 40px; }
      .sidebar-btn i { font-size: 14px; }
      #chatInput { font-size: 16px; }
    }
  </style>
</head>
<body class="bg-white text-gray-800 h-screen flex overflow-hidden">

  <!-- ============================================================ -->
  <!-- NARROW LEFT SIDEBAR (56px) — User Navigation -->
  <!-- ============================================================ -->
  <nav class="w-14 bg-gray-50 border-r border-gray-200 flex flex-col items-center py-3 shrink-0">
    <!-- Logo -->
    <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center mb-4 cursor-pointer" title="Agentic RAG Platform" onclick="switchToHomePage()">
      <i class="fas fa-brain text-white text-sm"></i>
    </div>

    <!-- Primary nav -->
    <div class="flex-1 w-full px-1 space-y-1 overflow-y-auto">
      <button class="sidebar-btn active" onclick="switchToHomePage()" title="Home">
        <i class="fas fa-home"></i>
        <span>Home</span>
      </button>
      <button class="sidebar-btn" onclick="toggleConversationPanel()" title="Conversations">
        <i class="fas fa-comments"></i>
        <span>Chats</span>
      </button>
      <a class="sidebar-btn" href="/ai-agents" title="All Agents">
        <i class="fas fa-star-of-life"></i>
        <span>Agents</span>
      </a>
    </div>

    <!-- Bottom nav -->
    <div class="w-full px-1 space-y-1 border-t border-gray-200 pt-2 mt-2">
      <a class="sidebar-btn" href="/admin" title="Admin Console">
        <i class="fas fa-tools"></i>
        <span>Admin</span>
      </a>
      <div class="flex items-center justify-center pt-1">
        <div class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center text-xs text-indigo-600 font-bold cursor-pointer" title="User">U</div>
      </div>
    </div>
  </nav>

  <!-- ============================================================ -->
  <!-- CONVERSATION LIST PANEL (slides out) -->
  <!-- ============================================================ -->
  <div id="convPanel" class="bg-gray-50 border-r border-gray-200 flex-col overflow-hidden absolute left-14 top-0 bottom-0 z-30 shadow-lg" style="width:256px; display:none;">
    <div class="flex items-center justify-between px-3 py-3 border-b border-gray-200">
      <span class="text-sm font-semibold text-gray-800">Conversations</span>
      <button onclick="closeConvPanel()" class="text-gray-400 hover:text-gray-700 text-xs p-1"><i class="fas fa-times"></i></button>
    </div>
    <div class="p-3">
      <button onclick="startNewConversation()" class="w-full px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-medium transition mb-3">
        <i class="fas fa-plus mr-1"></i>New Chat
      </button>
      <div id="convListSide" class="space-y-1">
        <div class="text-xs text-gray-400 py-4 text-center">Loading conversations...</div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MAIN CONTENT -->
  <!-- ============================================================ -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- ====================================================== -->
    <!-- HOME PAGE — Genspark-style centered layout              -->
    <!-- ====================================================== -->
    <div id="homePage" class="flex-1 flex flex-col items-center justify-center bg-white px-6">

      <!-- Title -->
      <h1 class="text-2xl font-bold text-gray-900 mb-8 text-center">Agentic RAG Platform</h1>

      <!-- Input Box -->
      <div class="w-full max-w-xl mb-3">
        <div class="home-input-box">
          <textarea id="chatInput"
            placeholder="Ask anything, create anything"
            rows="1"
            onkeydown="handleInputKeydown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <div class="home-input-toolbar">
            <div class="toolbar-left">
              <button class="toolbar-icon-btn" title="Attach file"><i class="fas fa-plus"></i></button>
              <button class="toolbar-icon-btn" title="GitHub"><i class="fab fa-github" style="color:#24292e"></i></button>
              <button class="toolbar-icon-btn" title="Attach"><i class="fas fa-paperclip"></i></button>
              <button class="toolbar-model-pill" title="Model selector">
                <i class="fas fa-bolt" style="color:#6366f1; font-size:11px;"></i>
                <span>GPT-4o</span>
              </button>
            </div>
            <div class="toolbar-right">
              <button class="toolbar-icon-btn" title="Voice input"><i class="fas fa-microphone"></i></button>
              <button onclick="sendMessage()" id="sendBtn" class="send-btn-dark">
                <i class="fas fa-plus" style="font-size:10px;"></i>
                <span>Send</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Suggestion pills -->
      <div class="flex items-center gap-2 mb-10 flex-wrap justify-center max-w-xl">
        <button class="suggestion-pill" onclick="sendQuickAction('Show me the system status and available tools')">
          Show system status
        </button>
        <button class="suggestion-pill" onclick="sendQuickAction('Create a new web app with a REST API')">
          Create a web app
        </button>
        <button class="suggestion-pill" onclick="sendQuickAction('Search my knowledge base for recent documents')">
          Search knowledge base
        </button>
      </div>

      <!-- Service icons row — each opens its own AI agent page -->
      <div class="flex items-start gap-5 flex-wrap justify-center max-w-2xl">
        <div class="service-icon-item" onclick="navigateToAgent('ai-slides')">
          <div class="service-icon-circle" style="background:#ecfdf5;"><i class="fas fa-file-powerpoint" style="color:#10b981;"></i></div>
          <span class="service-icon-label">AI Slides</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-sheets')">
          <div class="service-icon-circle" style="background:#f0fdf4;"><i class="fas fa-table" style="color:#22c55e;"></i></div>
          <span class="service-icon-label">AI Sheets</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-docs')">
          <div class="service-icon-circle" style="background:#eff6ff;"><i class="fas fa-file-alt" style="color:#3b82f6;"></i></div>
          <span class="service-icon-label">AI Docs</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-designer')">
          <div class="service-icon-circle" style="background:#fdf4ff;"><i class="fas fa-pen-ruler" style="color:#a855f7;"></i></div>
          <span class="service-icon-label">AI Designer</span>
        </div>
        <div class="service-icon-item" onclick="switchToChatMode(); sendQuickAction('Start a new chat conversation')" style="position:relative;">
          <div class="service-icon-circle" style="background:#eef2ff;"><i class="fas fa-comment-dots" style="color:#6366f1;"></i></div>
          <div style="position:absolute;top:0;right:14px;width:8px;height:8px;background:#3b82f6;border-radius:50%;border:2px solid #fff;"></div>
          <span class="service-icon-label">AI Chat</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-image')">
          <div class="service-icon-circle" style="background:#fff7ed;"><i class="fas fa-image" style="color:#f97316;"></i></div>
          <span class="service-icon-label">AI Image</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-music')">
          <div class="service-icon-circle" style="background:#fef2f2;"><i class="fas fa-music" style="color:#ef4444;"></i></div>
          <span class="service-icon-label">AI Music</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-video')">
          <div class="service-icon-circle" style="background:#ecfdf5;"><i class="fas fa-video" style="color:#14b8a6;"></i></div>
          <span class="service-icon-label">AI Video</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-meeting-notes')">
          <div class="service-icon-circle" style="background:#ecfdf5;"><i class="fas fa-clipboard-list" style="color:#0ea5e9;"></i></div>
          <span class="service-icon-label">AI Meeting<br>Notes</span>
        </div>
        <div class="service-icon-item" onclick="navigateToAgent('ai-agents')">
          <div class="service-icon-circle" style="background:#f5f5f5;"><i class="fas fa-star-of-life" style="color:#9ca3af;"></i></div>
          <span class="service-icon-label">All Agents</span>
        </div>
      </div>

      <!-- Token counter (subtle at bottom) -->
      <div class="mt-6 text-[11px] text-gray-400">
        <span id="tokenCounter">Tokens: 0 | Cost: $0.00</span>
      </div>
    </div>

    <!-- ====================================================== -->
    <!-- CHAT VIEW (hidden on home, shown during conversation)  -->
    <!-- ====================================================== -->
    <div id="chatView" class="flex-1 flex flex-col bg-white" style="display:none;">
      <!-- Chat header -->
      <div class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-2">
          <button onclick="switchToHomePage()" class="text-gray-400 hover:text-gray-700 mr-1" title="Back to Home">
            <i class="fas fa-arrow-left text-sm"></i>
          </button>
          <h2 class="text-sm font-semibold text-gray-800">Chat</h2>
          <span class="text-[10px] px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600 font-semibold">v1.9</span>
        </div>
        <div class="flex items-center gap-2">
          <div id="statusBadge" class="flex items-center gap-1.5 px-2 py-1 rounded-full bg-green-50 text-green-600 text-xs">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span>Live</span>
          </div>
        </div>
      </div>

      <!-- Chat messages -->
      <div id="chatMessages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 bg-white"></div>

      <!-- Chat input area -->
      <div class="border-t border-gray-200 bg-white p-3">
        <div class="max-w-2xl mx-auto">
          <div class="relative">
            <textarea id="chatInputActive"
              placeholder="Ask anything, create anything..."
              rows="1"
              onkeydown="handleInputKeydown(event)"
              oninput="autoResize(this)"
              class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 pr-28 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 resize-none max-h-32"
            ></textarea>
            <div class="absolute right-2 bottom-2 flex items-center gap-1.5">
              <button class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100 transition text-xs" title="Attach file">
                <i class="fas fa-plus"></i>
              </button>
              <div class="flex items-center gap-1 px-2 py-1 rounded-md bg-gray-100 text-[10px] text-gray-500 cursor-pointer hover:bg-gray-200 transition" title="Model">
                <i class="fas fa-brain text-indigo-500" style="font-size:10px"></i>
                <span class="text-gray-600">GPT-4o</span>
              </div>
              <button onclick="sendMessage()" id="sendBtnActive"
                class="w-7 h-7 bg-gray-900 hover:bg-gray-700 rounded-lg flex items-center justify-center transition">
                <i class="fas fa-arrow-up text-white text-xs"></i>
              </button>
            </div>
          </div>
          <div class="flex items-center justify-between mt-1.5 text-[11px] text-gray-400">
            <span>Enter to send · Shift+Enter for new line</span>
            <span id="tokenCounterActive">Tokens: 0 | Cost: $0.00</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="/static/js/home.js"></script>
</body>
</html>
