<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Docs — Agentic RAG Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }

    /* Sidebar */
    .nav-sidebar { width: 48px; min-width: 48px; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      padding: 8px 2px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; width: 100%; color: #64748b; border: none; background: none;
    }
    .nav-item:hover { background: rgba(59,130,246,0.08); color: #334155; }
    .nav-item.active { background: rgba(59,130,246,0.1); color: #2563eb; }
    .nav-item i { font-size: 14px; line-height: 1; }
    .nav-item span { font-size: 7px; font-weight: 500; line-height: 1.1; text-align: center; margin-top: 1px; }

    /* Input box */
    .docs-input-box {
      border: 1.5px solid #e5e7eb; border-radius: 14px; background: #fff;
      overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
      max-width: 600px; width: 100%;
    }
    .docs-input-box:focus-within { border-color: #bfdbfe; box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
    .docs-input-box textarea {
      width: 100%; border: none; outline: none; resize: none;
      padding: 14px 18px 6px; font-size: 14px; color: #1f2937;
      background: transparent; min-height: 40px; max-height: 100px;
    }
    .docs-input-box textarea::placeholder { color: #9ca3af; }
    .docs-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px 8px; gap: 6px;
    }
    .docs-toolbar .toolbar-left { display: flex; align-items: center; gap: 3px; }
    .docs-toolbar .toolbar-right { display: flex; align-items: center; gap: 5px; }

    .tool-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; border: none; background: transparent; color: #9ca3af;
      cursor: pointer; transition: all 0.15s; font-size: 13px;
    }
    .tool-btn:hover { background: #f3f4f6; color: #4b5563; }

    /* Format pills */
    .fmt-pill {
      padding: 3px 10px; border-radius: 6px; border: none; background: transparent;
      font-size: 12px; font-weight: 500; color: #9ca3af; cursor: pointer; transition: all 0.15s;
    }
    .fmt-pill:hover { color: #374151; background: #f3f4f6; }
    .fmt-pill.active { color: #dc2626; font-weight: 600; }

    /* Category tabs */
    .cat-tabs {
      display: flex; align-items: center; gap: 0; border-bottom: 1px solid #f3f4f6;
      overflow-x: auto; white-space: nowrap;
    }
    .cat-tab {
      padding: 10px 16px; font-size: 12px; font-weight: 500; color: #6b7280;
      cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent;
      transition: all 0.15s; white-space: nowrap;
    }
    .cat-tab:hover { color: #111827; }
    .cat-tab.active { color: #111827; border-bottom-color: #111827; }

    /* Template cards */
    .tmpl-card {
      border: 1px solid #f3f4f6; border-radius: 10px; padding: 20px;
      cursor: pointer; transition: all 0.2s; background: #fff;
    }
    .tmpl-card:hover { border-color: #bfdbfe; box-shadow: 0 4px 15px rgba(0,0,0,0.06); transform: translateY(-2px); }

    /* Editor area */
    .editor-toolbar {
      display: flex; align-items: center; gap: 2px; padding: 6px 12px;
      background: #fafafa; border-bottom: 1px solid #e5e7eb;
    }
    .editor-btn {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 5px; border: none; background: transparent; color: #6b7280;
      cursor: pointer; transition: all 0.12s; font-size: 13px;
    }
    .editor-btn:hover { background: #e5e7eb; color: #111827; }
    .editor-btn.active { background: #dbeafe; color: #2563eb; }
    .editor-sep { width: 1px; height: 20px; background: #e5e7eb; margin: 0 4px; }

    .doc-content {
      flex: 1; padding: 40px 60px; overflow-y: auto; outline: none;
      font-size: 15px; line-height: 1.8; color: #1f2937; background: #fff;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    .doc-content:focus { outline: none; }
    .doc-content h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; color: #111827; font-family: 'Segoe UI', sans-serif; }
    .doc-content h2 { font-size: 22px; font-weight: 600; margin: 20px 0 8px; color: #1f2937; font-family: 'Segoe UI', sans-serif; }
    .doc-content h3 { font-size: 18px; font-weight: 600; margin: 16px 0 6px; color: #374151; font-family: 'Segoe UI', sans-serif; }
    .doc-content ul, .doc-content ol { padding-left: 24px; margin: 8px 0; }
    .doc-content li { margin-bottom: 4px; }
    .doc-content blockquote { border-left: 3px solid #d1d5db; padding-left: 16px; color: #6b7280; margin: 12px 0; }
    .doc-content code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'Courier New', monospace; }
    .doc-content pre { background: #1f2937; color: #e5e7eb; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    .doc-content pre code { background: transparent; padding: 0; color: inherit; }
    .doc-content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .doc-content th, .doc-content td { border: 1px solid #e5e7eb; padding: 8px 12px; text-align: left; font-size: 14px; }
    .doc-content th { background: #f9fafb; font-weight: 600; }

    /* Markdown editor */
    .md-editor {
      flex: 1; padding: 40px 60px; overflow-y: auto;
      font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.7;
      color: #1f2937; background: #fff; border: none; outline: none; resize: none; width: 100%;
    }

    /* Status bar */
    .doc-status {
      display: flex; align-items: center; justify-content: space-between;
      height: 26px; padding: 0 16px; background: #f8fafc; border-top: 1px solid #e5e7eb;
      font-size: 10px; color: #9ca3af;
    }

    /* Send button */
    .send-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: none; background: #111827; color: #fff;
      cursor: pointer; transition: all 0.15s; font-size: 11px;
    }
    .send-btn:hover { background: #374151; }

    @media (max-width: 768px) {
      .nav-sidebar { width: 40px; min-width: 40px; }
      .nav-item span { display: none; }
      .doc-content, .md-editor { padding: 20px 16px; }
      .cat-tab { padding: 8px 10px; font-size: 11px; }
      .tmpl-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body class="bg-white text-gray-800 h-screen flex overflow-hidden">

  <!-- LEFT SIDEBAR -->
  <nav class="nav-sidebar bg-gray-50 border-r border-gray-200 flex flex-col items-center py-2 shrink-0">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center mb-3 cursor-pointer" title="Home" onclick="navigateHome()">
      <i class="fas fa-brain text-white text-xs"></i>
    </div>
    <div class="flex-1 w-full px-0.5 space-y-0.5 overflow-y-auto">
      <button class="nav-item" onclick="navigateHome()" title="New"><i class="fas fa-plus"></i><span>New</span></button>
      <button class="nav-item active" title="AI Docs"><i class="fas fa-file-alt"></i><span>AI Docs</span></button>
      <button class="nav-item" onclick="navigateHome()" title="Home"><i class="fas fa-home"></i><span>Home</span></button>
      <button class="nav-item" title="More"><i class="fas fa-ellipsis-h"></i><span>More</span></button>
      <button class="nav-item" title="Workflows"><i class="fas fa-project-diagram"></i><span>Workflows</span></button>
      <button class="nav-item" title="Stacks"><i class="fas fa-layer-group"></i><span>Stacks</span></button>
      <button class="nav-item" title="Files"><i class="fas fa-folder"></i><span>Files</span></button>
      <button class="nav-item" title="AI Tools"><i class="fas fa-wand-magic-sparkles"></i><span>AI Tools</span></button>
    </div>
    <div class="w-full px-0.5 border-t border-gray-200 pt-1 mt-1">
      <button class="nav-item" title="Settings"><i class="fas fa-cog"></i><span>Settings</span></button>
      <div class="flex items-center justify-center pt-1">
        <div class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-[9px] text-blue-700 font-bold cursor-pointer">U</div>
      </div>
    </div>
  </nav>

  <!-- MAIN AREA -->
  <main class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Top nav -->
    <header class="flex items-center justify-between px-4 py-2 border-b border-gray-100 shrink-0 bg-white">
      <div class="flex items-center gap-3">
        <button onclick="navigateHome()" class="text-gray-400 hover:text-gray-700 transition p-1" title="Back"><i class="fas fa-arrow-left text-sm"></i></button>
        <button class="text-gray-400 hover:text-gray-700 transition p-1" title="Menu"><i class="fas fa-bars text-sm"></i></button>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="exportDoc()" class="text-xs text-gray-500 hover:text-gray-700 px-2 py-1 rounded hover:bg-gray-50 transition flex items-center gap-1">
          <i class="fas fa-download"></i> Export
        </button>
        <button onclick="printDoc()" class="text-xs text-gray-500 hover:text-gray-700 px-2 py-1 rounded hover:bg-gray-50 transition flex items-center gap-1">
          <i class="fas fa-print"></i> Print
        </button>
      </div>
    </header>

    <!-- HOME VIEW (create screen) -->
    <div id="homeView" class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-6 pt-16 pb-8">

        <!-- Title -->
        <h1 class="text-2xl font-bold text-gray-900 text-center mb-8">AI Docs</h1>

        <!-- Input box -->
        <div class="flex justify-center mb-12">
          <div class="docs-input-box">
            <textarea id="docsInput"
              placeholder="Describe the document you want to create (e.g., Resume, Report, Contract...)"
              rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generateDoc()}"
              oninput="autoResize(this)"
            ></textarea>
            <div class="docs-toolbar">
              <div class="toolbar-left">
                <button class="tool-btn" title="Attach"><i class="fas fa-plus"></i></button>
                <span class="text-[10px] text-gray-400 flex items-center gap-1 ml-1"><i class="fas fa-gem text-purple-400" style="font-size:9px"></i> Ultra</span>
                <button class="fmt-pill active" data-fmt="richtext" onclick="selectFormat(this)">Rich Text</button>
                <button class="fmt-pill" data-fmt="markdown" onclick="selectFormat(this)">Markdown</button>
              </div>
              <div class="toolbar-right">
                <button class="tool-btn" title="Voice"><i class="fas fa-microphone"></i></button>
                <button class="send-btn" onclick="generateDoc()" title="Generate"><i class="fas fa-arrow-up"></i></button>
              </div>
            </div>
          </div>
        </div>

        <!-- Category tabs -->
        <div class="cat-tabs mb-6">
          <button class="cat-tab active" data-cat="all" onclick="filterCat('all')">All Templates</button>
          <button class="cat-tab" data-cat="job" onclick="filterCat('job')">Job Applications</button>
          <button class="cat-tab" data-cat="business" onclick="filterCat('business')">Business Communications</button>
          <button class="cat-tab" data-cat="reports" onclick="filterCat('reports')">Reports and Analysis</button>
          <button class="cat-tab" data-cat="forms" onclick="filterCat('forms')">Forms and Surveys</button>
          <button class="cat-tab" data-cat="legal" onclick="filterCat('legal')">Legal and Finance</button>
          <button class="cat-tab" data-cat="education" onclick="filterCat('education')">Education and Training</button>
          <button class="cat-tab" data-cat="creative" onclick="filterCat('creative')">Creative and Marketing</button>
          <button class="cat-tab" data-cat="event" onclick="filterCat('event')">Event and Planning</button>
        </div>

        <!-- Template grid -->
        <div id="templateGrid" class="tmpl-grid grid grid-cols-3 gap-4 pb-8">
        </div>
      </div>
    </div>

    <!-- EDITOR VIEW (hidden by default) -->
    <div id="editorView" class="flex-1 flex flex-col" style="display:none;">

      <!-- Document title bar -->
      <div class="flex items-center gap-3 px-6 py-2 border-b border-gray-100 bg-white shrink-0">
        <button onclick="backToHome()" class="text-gray-400 hover:text-gray-700 text-xs"><i class="fas fa-arrow-left mr-1"></i>Back</button>
        <input id="docTitle" type="text" value="Untitled Document"
          class="flex-1 text-sm font-semibold text-gray-800 border-none outline-none bg-transparent"
          onchange="modified=true; updateStatus()">
        <span id="saveStatus" class="text-[10px] text-green-500"><i class="fas fa-check-circle mr-1"></i>Saved</span>
      </div>

      <!-- Rich Text toolbar -->
      <div id="richTextToolbar" class="editor-toolbar shrink-0">
        <select id="edHeading" onchange="execCmd('formatBlock', this.value); this.value='';" class="text-xs border border-gray-200 rounded px-1 py-1 outline-none bg-white">
          <option value="">Paragraph</option>
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="blockquote">Quote</option>
        </select>
        <div class="editor-sep"></div>
        <button class="editor-btn" onclick="execCmd('bold')" title="Bold"><b>B</b></button>
        <button class="editor-btn" onclick="execCmd('italic')" title="Italic"><i style="font-style:italic">I</i></button>
        <button class="editor-btn" onclick="execCmd('underline')" title="Underline"><u>U</u></button>
        <button class="editor-btn" onclick="execCmd('strikeThrough')" title="Strikethrough"><s>S</s></button>
        <div class="editor-sep"></div>
        <button class="editor-btn" onclick="document.getElementById('edFontColor').click()" title="Font Color"><span style="border-bottom:3px solid #ef4444; padding-bottom:1px;">A</span></button>
        <input type="color" id="edFontColor" value="#000000" onchange="execCmd('foreColor', this.value)" style="display:none">
        <button class="editor-btn" onclick="document.getElementById('edBgColor').click()" title="Highlight"><i class="fas fa-highlighter" style="color:#fbbf24"></i></button>
        <input type="color" id="edBgColor" value="#ffff00" onchange="execCmd('hiliteColor', this.value)" style="display:none">
        <div class="editor-sep"></div>
        <button class="editor-btn" onclick="execCmd('justifyLeft')" title="Align Left"><i class="fas fa-align-left"></i></button>
        <button class="editor-btn" onclick="execCmd('justifyCenter')" title="Center"><i class="fas fa-align-center"></i></button>
        <button class="editor-btn" onclick="execCmd('justifyRight')" title="Align Right"><i class="fas fa-align-right"></i></button>
        <div class="editor-sep"></div>
        <button class="editor-btn" onclick="execCmd('insertUnorderedList')" title="Bullet List"><i class="fas fa-list-ul"></i></button>
        <button class="editor-btn" onclick="execCmd('insertOrderedList')" title="Numbered List"><i class="fas fa-list-ol"></i></button>
        <div class="editor-sep"></div>
        <button class="editor-btn" onclick="insertLink()" title="Link"><i class="fas fa-link"></i></button>
        <button class="editor-btn" onclick="insertImage()" title="Image"><i class="fas fa-image"></i></button>
        <button class="editor-btn" onclick="insertTable()" title="Table"><i class="fas fa-table"></i></button>
        <button class="editor-btn" onclick="insertCodeBlock()" title="Code Block"><i class="fas fa-code"></i></button>
        <button class="editor-btn" onclick="insertHR()" title="Horizontal Rule"><i class="fas fa-minus"></i></button>
        <div class="flex-1"></div>
        <button class="editor-btn" onclick="toggleMode()" id="modeToggle" title="Switch to Markdown"><i class="fas fa-code"></i></button>
      </div>

      <!-- Rich Text content area -->
      <div id="richEditor" class="doc-content" contenteditable="true"
        oninput="onDocInput()"
        onpaste="handlePaste(event)">
      </div>

      <!-- Markdown editor (hidden) -->
      <textarea id="mdEditor" class="md-editor" style="display:none;"
        oninput="onDocInput()"
        placeholder="Write your document in Markdown..."
      ></textarea>

      <!-- Status bar -->
      <div class="doc-status shrink-0">
        <span id="docStats">Words: 0 | Characters: 0</span>
        <span id="docFormat">Rich Text</span>
      </div>
    </div>

    <!-- GENERATING OVERLAY -->
    <div id="genOverlay" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center" style="display:none;">
      <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 text-center shadow-2xl">
        <div class="relative w-14 h-14 mx-auto mb-4">
          <div class="absolute inset-0 rounded-full border-4 border-gray-200"></div>
          <div class="absolute inset-0 rounded-full border-4 border-blue-500 border-t-transparent animate-spin"></div>
          <i class="fas fa-file-alt text-blue-500 text-lg absolute inset-0 flex items-center justify-center"></i>
        </div>
        <h3 class="text-base font-bold text-gray-900 mb-1">Creating Your Document</h3>
        <p id="genStatus" class="text-sm text-gray-500">Analyzing requirements...</p>
        <button onclick="cancelGen()" class="mt-3 text-xs text-gray-400 hover:text-gray-600">Cancel</button>
      </div>
    </div>

  </main>

  <script>
  // ============================================================
  // AI DOCS ENGINE
  // ============================================================

  let currentFormat = 'richtext'; // 'richtext' or 'markdown'
  let editorMode = 'richtext';
  let generating = false;
  let modified = false;
  let currentCategory = 'all';

  // Template data
  const TEMPLATES = [
    // Job Applications
    { cat: 'job', icon: 'fa-file-lines', color: '#3b82f6', title: 'Professional Resume', desc: 'Modern resume with clean formatting and sections for experience, skills, and education' },
    { cat: 'job', icon: 'fa-envelope', color: '#6366f1', title: 'Cover Letter', desc: 'Compelling cover letter tailored to your target position and company' },
    { cat: 'job', icon: 'fa-id-badge', color: '#8b5cf6', title: 'CV (Curriculum Vitae)', desc: 'Comprehensive CV for academic or international job applications' },
    { cat: 'job', icon: 'fa-handshake', color: '#0ea5e9', title: 'Thank You Letter', desc: 'Post-interview thank you note to leave a lasting impression' },
    // Business Communications
    { cat: 'business', icon: 'fa-briefcase', color: '#f59e0b', title: 'Business Proposal', desc: 'Professional proposal document for clients or stakeholders' },
    { cat: 'business', icon: 'fa-envelope-open-text', color: '#10b981', title: 'Business Email', desc: 'Formal business email for various professional scenarios' },
    { cat: 'business', icon: 'fa-bullhorn', color: '#ef4444', title: 'Press Release', desc: 'Official press release announcement for media distribution' },
    { cat: 'business', icon: 'fa-clipboard-list', color: '#14b8a6', title: 'Meeting Agenda', desc: 'Structured meeting agenda with topics, times, and action items' },
    // Reports and Analysis
    { cat: 'reports', icon: 'fa-chart-bar', color: '#6366f1', title: 'Business Report', desc: 'Comprehensive business report with executive summary and analysis' },
    { cat: 'reports', icon: 'fa-magnifying-glass-chart', color: '#0891b2', title: 'Market Analysis', desc: 'In-depth market research report with trends and forecasts' },
    { cat: 'reports', icon: 'fa-flask', color: '#7c3aed', title: 'Research Paper', desc: 'Academic research paper with abstract, methodology, and findings' },
    { cat: 'reports', icon: 'fa-file-invoice-dollar', color: '#059669', title: 'Financial Report', desc: 'Financial statements and analysis with charts and projections' },
    // Forms and Surveys
    { cat: 'forms', icon: 'fa-list-check', color: '#f97316', title: 'Survey Form', desc: 'Customizable survey with multiple question types and scoring' },
    { cat: 'forms', icon: 'fa-clipboard', color: '#64748b', title: 'Feedback Form', desc: 'Customer or employee feedback collection template' },
    { cat: 'forms', icon: 'fa-user-plus', color: '#2563eb', title: 'Registration Form', desc: 'Event or service registration with required fields' },
    // Legal and Finance
    { cat: 'legal', icon: 'fa-gavel', color: '#dc2626', title: 'Contract Agreement', desc: 'Legal contract template with terms, conditions, and signatures' },
    { cat: 'legal', icon: 'fa-shield-halved', color: '#4b5563', title: 'NDA (Non-Disclosure)', desc: 'Confidentiality agreement for protecting sensitive information' },
    { cat: 'legal', icon: 'fa-scale-balanced', color: '#b45309', title: 'Terms of Service', desc: 'Website or app terms of service and usage policy' },
    // Education and Training
    { cat: 'education', icon: 'fa-graduation-cap', color: '#7c3aed', title: 'Course Syllabus', desc: 'Academic course outline with schedule, grading, and objectives' },
    { cat: 'education', icon: 'fa-book-open', color: '#0d9488', title: 'Lesson Plan', desc: 'Structured lesson plan with activities and learning goals' },
    { cat: 'education', icon: 'fa-certificate', color: '#ca8a04', title: 'Training Manual', desc: 'Comprehensive training guide with procedures and exercises' },
    // Creative and Marketing
    { cat: 'creative', icon: 'fa-pen-fancy', color: '#ec4899', title: 'Blog Post', desc: 'SEO-optimized blog article with engaging content structure' },
    { cat: 'creative', icon: 'fa-bullseye', color: '#f43f5e', title: 'Marketing Plan', desc: 'Strategic marketing plan with campaigns, channels, and KPIs' },
    { cat: 'creative', icon: 'fa-newspaper', color: '#6366f1', title: 'Newsletter', desc: 'Company or personal newsletter with sections and highlights' },
    { cat: 'creative', icon: 'fa-hashtag', color: '#0ea5e9', title: 'Social Media Copy', desc: 'Platform-specific social media posts and campaign copy' },
    // Event and Planning
    { cat: 'event', icon: 'fa-calendar-days', color: '#16a34a', title: 'Event Plan', desc: 'Detailed event planning document with timeline and logistics' },
    { cat: 'event', icon: 'fa-map-location-dot', color: '#ea580c', title: 'Travel Itinerary', desc: 'Organized travel schedule with flights, hotels, and activities' },
    { cat: 'event', icon: 'fa-list-ol', color: '#0891b2', title: 'Project Plan', desc: 'Project management document with milestones and deliverables' },
  ];

  document.addEventListener('DOMContentLoaded', () => {
    renderTemplates();
  });

  // ============================================================
  // TEMPLATES
  // ============================================================
  function renderTemplates() {
    const grid = document.getElementById('templateGrid');
    const filtered = currentCategory === 'all' ? TEMPLATES : TEMPLATES.filter(t => t.cat === currentCategory);
    grid.innerHTML = filtered.map(t => `
      <div class="tmpl-card" onclick="useTemplate('${t.title}')">
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" style="background:${t.color}15">
            <i class="fas ${t.icon}" style="color:${t.color}; font-size:16px;"></i>
          </div>
          <div class="min-w-0">
            <div class="text-sm font-semibold text-gray-900 mb-0.5">${t.title}</div>
            <div class="text-xs text-gray-500 leading-relaxed">${t.desc}</div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function filterCat(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
    renderTemplates();
  }

  function useTemplate(title) {
    document.getElementById('docsInput').value = `Create a ${title}`;
    document.getElementById('docsInput').focus();
    autoResize(document.getElementById('docsInput'));
  }

  // ============================================================
  // FORMAT SELECTION
  // ============================================================
  function selectFormat(btn) {
    document.querySelectorAll('.fmt-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    currentFormat = btn.dataset.fmt;
  }

  // ============================================================
  // GENERATE DOCUMENT
  // ============================================================
  function generateDoc() {
    const input = document.getElementById('docsInput');
    const desc = input.value.trim();
    if (!desc) { input.focus(); input.placeholder = 'Please describe a document first...'; setTimeout(() => { input.placeholder = 'Describe the document you want to create (e.g., Resume, Report, Contract...)'; }, 2000); return; }

    generating = true;
    document.getElementById('genOverlay').style.display = '';

    const stages = [
      'Analyzing requirements...',
      'Generating document structure...',
      'Writing content sections...',
      'Formatting and polishing...',
      'Document ready!'
    ];
    let i = 0;
    const iv = setInterval(() => {
      if (!generating) { clearInterval(iv); return; }
      if (i < stages.length) {
        document.getElementById('genStatus').textContent = stages[i];
        i++;
      }
      if (i >= stages.length) {
        clearInterval(iv);
        setTimeout(() => {
          if (!generating) return;
          generating = false;
          document.getElementById('genOverlay').style.display = 'none';
          showEditor(generateSampleDoc(desc));
        }, 800);
      }
    }, 1000);

    // Also send to backend
    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Create a document: ${desc}`, model: 'gpt-4o', agentType: 'docs' })
    }).catch(() => {});
  }

  function cancelGen() {
    generating = false;
    document.getElementById('genOverlay').style.display = 'none';
  }

  function generateSampleDoc(desc) {
    const title = desc.replace(/^create\s+(a|an)\s+/i, '').replace(/^\w/, c => c.toUpperCase());
    return `<h1>${title}</h1>
<p><em>Generated by AI Docs — ${new Date().toLocaleDateString()}</em></p>

<h2>1. Overview</h2>
<p>This document provides a comprehensive ${title.toLowerCase()} covering all essential aspects. It has been automatically generated based on your requirements and can be fully customized.</p>

<h2>2. Key Details</h2>
<ul>
  <li><strong>Document Type:</strong> ${title}</li>
  <li><strong>Created:</strong> ${new Date().toLocaleDateString()}</li>
  <li><strong>Format:</strong> ${currentFormat === 'markdown' ? 'Markdown' : 'Rich Text'}</li>
  <li><strong>Status:</strong> Draft — Ready for editing</li>
</ul>

<h2>3. Content</h2>
<p>Begin editing this section to add your specific content. You can use the toolbar above to format text, add lists, insert links, images, and tables.</p>

<blockquote>Tip: Use the AI assistant to expand sections, rewrite paragraphs, or generate additional content.</blockquote>

<h2>4. Summary</h2>
<p>This ${title.toLowerCase()} is ready for your review and customization. Export it as HTML, Markdown, or print it directly from the editor.</p>

<h2>5. Next Steps</h2>
<ol>
  <li>Review and edit the content above</li>
  <li>Add your specific details and data</li>
  <li>Format using the toolbar</li>
  <li>Export or print the final document</li>
</ol>`;
  }

  // ============================================================
  // EDITOR
  // ============================================================
  function showEditor(html) {
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('editorView').style.display = '';
    editorMode = currentFormat;

    if (editorMode === 'markdown') {
      document.getElementById('richTextToolbar').style.display = 'none';
      document.getElementById('richEditor').style.display = 'none';
      document.getElementById('mdEditor').style.display = '';
      // Convert HTML to basic markdown
      document.getElementById('mdEditor').value = htmlToMarkdown(html);
      document.getElementById('docFormat').textContent = 'Markdown';
    } else {
      document.getElementById('richTextToolbar').style.display = '';
      document.getElementById('richEditor').style.display = '';
      document.getElementById('mdEditor').style.display = 'none';
      document.getElementById('richEditor').innerHTML = html;
      document.getElementById('docFormat').textContent = 'Rich Text';
    }
    updateWordCount();
  }

  function backToHome() {
    if (modified && !confirm('You have unsaved changes. Go back?')) return;
    document.getElementById('editorView').style.display = 'none';
    document.getElementById('homeView').style.display = '';
    modified = false;
  }

  function toggleMode() {
    if (editorMode === 'richtext') {
      // Switch to markdown
      const html = document.getElementById('richEditor').innerHTML;
      document.getElementById('mdEditor').value = htmlToMarkdown(html);
      document.getElementById('richTextToolbar').style.display = 'none';
      document.getElementById('richEditor').style.display = 'none';
      document.getElementById('mdEditor').style.display = '';
      editorMode = 'markdown';
      document.getElementById('docFormat').textContent = 'Markdown';
      document.getElementById('modeToggle').title = 'Switch to Rich Text';
      document.getElementById('modeToggle').innerHTML = '<i class="fas fa-font"></i>';
    } else {
      // Switch to rich text
      const md = document.getElementById('mdEditor').value;
      document.getElementById('richEditor').innerHTML = marked.parse(md);
      document.getElementById('richTextToolbar').style.display = '';
      document.getElementById('richEditor').style.display = '';
      document.getElementById('mdEditor').style.display = 'none';
      editorMode = 'richtext';
      document.getElementById('docFormat').textContent = 'Rich Text';
      document.getElementById('modeToggle').title = 'Switch to Markdown';
      document.getElementById('modeToggle').innerHTML = '<i class="fas fa-code"></i>';
    }
  }

  // Rich text commands
  function execCmd(cmd, val) {
    document.execCommand(cmd, false, val || null);
    document.getElementById('richEditor').focus();
    modified = true;
    updateWordCount();
  }

  function insertLink() {
    const url = prompt('Enter URL:', 'https://');
    if (url) execCmd('createLink', url);
  }
  function insertImage() {
    const url = prompt('Enter image URL:', 'https://');
    if (url) execCmd('insertImage', url);
  }
  function insertHR() { execCmd('insertHorizontalRule'); }
  function insertCodeBlock() {
    execCmd('insertHTML', '<pre><code>// Your code here\n</code></pre><p></p>');
  }
  function insertTable() {
    const html = `<table><thead><tr><th>Header 1</th><th>Header 2</th><th>Header 3</th></tr></thead><tbody><tr><td>Data</td><td>Data</td><td>Data</td></tr><tr><td>Data</td><td>Data</td><td>Data</td></tr></tbody></table><p></p>`;
    execCmd('insertHTML', html);
  }

  function handlePaste(e) {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  }

  function onDocInput() {
    modified = true;
    document.getElementById('saveStatus').innerHTML = '<i class="fas fa-circle text-amber-400 mr-1" style="font-size:6px"></i>Unsaved';
    updateWordCount();
    // Auto-save simulation
    clearTimeout(window._saveTimer);
    window._saveTimer = setTimeout(() => {
      document.getElementById('saveStatus').innerHTML = '<i class="fas fa-check-circle text-green-500 mr-1"></i>Saved';
    }, 2000);
  }

  function updateWordCount() {
    let text;
    if (editorMode === 'richtext') {
      text = document.getElementById('richEditor').innerText || '';
    } else {
      text = document.getElementById('mdEditor').value || '';
    }
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const chars = text.length;
    document.getElementById('docStats').textContent = `Words: ${words.toLocaleString()} | Characters: ${chars.toLocaleString()}`;
  }

  // ============================================================
  // EXPORT
  // ============================================================
  function exportDoc() {
    let content, filename, mime;
    const title = document.getElementById('docTitle')?.value || 'Untitled';

    if (editorMode === 'markdown' || document.getElementById('editorView').style.display === 'none') {
      const md = document.getElementById('mdEditor')?.value || '';
      content = md;
      filename = title.replace(/\s+/g, '_') + '.md';
      mime = 'text/markdown';
    } else {
      const html = document.getElementById('richEditor')?.innerHTML || '';
      content = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title><style>body{font-family:Georgia,serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.8;color:#1f2937}h1{font-size:28px}h2{font-size:22px;margin-top:24px}h3{font-size:18px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #e5e7eb;padding:8px 12px}th{background:#f9fafb;font-weight:600}blockquote{border-left:3px solid #d1d5db;padding-left:16px;color:#6b7280}code{background:#f3f4f6;padding:2px 6px;border-radius:4px}pre{background:#1f2937;color:#e5e7eb;padding:16px;border-radius:8px}pre code{background:transparent}</style></head><body>${html}</body></html>`;
      filename = title.replace(/\s+/g, '_') + '.html';
      mime = 'text/html';
    }

    const blob = new Blob([content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Exported ' + filename);
  }

  function printDoc() {
    const content = editorMode === 'richtext'
      ? document.getElementById('richEditor').innerHTML
      : marked.parse(document.getElementById('mdEditor').value);
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>Print</title><style>body{font-family:Georgia,serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.8}@media print{body{margin:0}}</style></head><body>${content}</body></html>`);
    w.document.close();
    w.print();
  }

  // ============================================================
  // UTILS
  // ============================================================
  function navigateHome() { window.location.href = '/'; }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

  function htmlToMarkdown(html) {
    return html
      .replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n')
      .replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n')
      .replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n')
      .replace(/<strong>(.*?)<\/strong>/gi, '**$1**')
      .replace(/<b>(.*?)<\/b>/gi, '**$1**')
      .replace(/<em>(.*?)<\/em>/gi, '*$1*')
      .replace(/<i>(.*?)<\/i>/gi, '*$1*')
      .replace(/<u>(.*?)<\/u>/gi, '$1')
      .replace(/<li>(.*?)<\/li>/gi, '- $1\n')
      .replace(/<ul[^>]*>|<\/ul>/gi, '\n')
      .replace(/<ol[^>]*>|<\/ol>/gi, '\n')
      .replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1\n\n')
      .replace(/<pre><code>(.*?)<\/code><\/pre>/gis, '```\n$1\n```\n\n')
      .replace(/<code>(.*?)<\/code>/gi, '`$1`')
      .replace(/<a href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)')
      .replace(/<img src="([^"]*)"[^>]*>/gi, '![]($1)')
      .replace(/<hr\s*\/?>/gi, '\n---\n\n')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<p[^>]*>(.*?)<\/p>/gi, '$1\n\n')
      .replace(/<[^>]+>/g, '')
      .replace(/&nbsp;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
  }

  function updateStatus() {}

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-medium shadow-lg z-50';
    t.style.opacity = '0'; t.style.transition = 'opacity 0.2s';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => { t.style.opacity = '1'; });
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2500);
  }
  </script>
</body>
</html>
